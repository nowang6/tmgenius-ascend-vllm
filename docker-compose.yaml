services:
  tmgenius-asr-qwen:
    build:
      context: .
      args:
        BASE_IMAGE: quay.io/ascend/vllm-ascend:v0.19.1rc1
    image: tmgenius/vllm-ascend:v0.19.1rc1
    container_name: tmgenius-asr-qwen
    restart: unless-stopped

    ports:
      - "18856:8856"    # ASR WebSocket（宿主 18856 → 容器 8856）
      - "15002:15002"   # vLLM 推理服务

    volumes:
      - /usr/local/dcmi:/usr/local/dcmi:ro
      - /usr/local/bin/npu-smi:/usr/local/bin/npu-smi:ro
      - /usr/local/Ascend/driver/lib64/:/usr/local/Ascend/driver/lib64/:ro
      - /usr/local/Ascend/driver/version.info:/usr/local/Ascend/driver/version.info:ro
      - /etc/ascend_install.info:/etc/ascend_install.info:ro
      - ./weights/Qwen3-ASR-1.7B:/weights/Qwen3-ASR-1.7B:ro

    environment:
      # ---- NPU 设备可见性 ----
      ASCEND_VISIBLE_DEVICES: "6"
      NPU_VISIBLE_DEVICES: "6"
      ASCEND_RT_VISIBLE_DEVICES: "6"
      # ---- 服务 ----
      WS_HOST: "0.0.0.0"
      WS_PORT: "8856"
      MAX_CONNECTIONS: "64"
      HANDSHAKE_TIMEOUT: "5"
      WS_PING_INTERVAL: "5"
      WS_PING_TIMEOUT: "20"
      LOG_LEVEL: "INFO"
      # ---- vLLM ----
      VLLM_API_BASE: "http://127.0.0.1:15002/v1"
      VLLM_MODEL_NAME: "Qwen3-ASR-1.7B"
      VLLM_MODEL_PATH: "/weights/Qwen3-ASR-1.7B"
      VLLM_PORT: "15002"
      VLLM_TENSOR_PARALLEL_SIZE: "1"
      VLLM_MAX_MODEL_LEN: "32768"
      VLLM_GPU_MEMORY_UTILIZATION: "0.6"
      VLLM_EXTRA_ARGS: "--dtype float16 --enforce-eager"
      VLLM_STARTUP_TIMEOUT: "3000"
      VLLM_HEALTH_CHECK_INTERVAL: "5"
      # ---- ITN ----
      ITN_WORKERS: "8"
      # ---- 热词 ----
      HOTWORDS: ""
      # ---- VAD ----
      VAD_HOP_SIZE: "640"
      VAD_THRESHOLD: "0.4"
      VAD_PAUSE_MAX: "0.7"
      VAD_PAUSE_MIN: "0.35"
      VAD_DYNAMIC_RANGE_END: "20.0"
      VAD_MIN_SPEECH: "0.5"
      VAD_MAX_SPEECH: "30.0"

    devices:
      - /dev/davinci2
      - /dev/davinci_manager
      - /dev/devmm_svm
      - /dev/hisi_hdc

    privileged: true

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8856/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 120s

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        
    command: ["python", "main.py"]
